let _nuevoPackingRows = [];

function procesarPackingFile(file) {
  if (!file) return;
  const preview = document.getElementById('pk-preview');
  if (preview) preview.innerHTML = '<div style="text-align:center;padding:16px;color:var(--text3)">⏳ Leyendo archivo…</div>';
  const reader = new FileReader();
  reader.onload = e => {
    const text = new TextDecoder('utf-8').decode(e.target.result);
    if (text.includes(',') || text.includes(';')) {
      procesarPackingCSV(text);
    } else {
      if (preview) preview.innerHTML = '<div style="color:red;padding:12px">No se pudo leer el archivo. Asegúrate de exportarlo como CSV desde Excel.</div>';
    }
  };
  reader.readAsArrayBuffer(file);
}

function procesarPackingCSV(text) {
  const sep = text.includes(';') ? ';' : ',';
  const lines = text.trim().split('\n');
  const headers = lines[0].split(sep).map(h=>h.trim().replace(/^"|"$/g,'').toLowerCase());
  const ci = k => headers.findIndex(h=>h.includes(k));
  const colCod=ci('cod int'), colDesc=ci('desc'), colCont=ci('cont');
  const colPL=ci('pl'), colIN=ci('qty in'), colDif=ci('dif');
  const colFecha=ci('fech'), colEstado=ci('estado');

  _nuevoPackingRows = [];
  lines.slice(1).forEach(line => {
    if (!line.trim()) return;
    const cols = line.split(sep).map(c=>c.trim().replace(/^"|"$/g,''));
    const cod = cols[colCod]||''; if (!cod) return;
    const qty_pl = parseInt(cols[colPL])||0;
    const qty_in = parseInt(cols[colIN])||0;
    _nuevoPackingRows.push({
      cod, cod_cli:'', desc: cols[colDesc]||'',
      contenedor: cols[colCont]||'',
      qty_pl, qty_in,
      dif: colDif>=0?(parseInt(cols[colDif])||0):(qty_in-qty_pl),
      fecha_ing: cols[colFecha]||'',
      estado: cols[colEstado]||'REVISADO'
    });
  });

  const conts  = [...new Set(_nuevoPackingRows.map(r=>r.contenedor))];
  const nDiff  = _nuevoPackingRows.filter(r=>r.dif!==0).length;
  const preview = document.getElementById('pk-preview');
  if (!preview) return;
  preview.innerHTML = `
    <div style="background:#e6f2ec;border-radius:8px;padding:12px;font-size:12px;color:#166534;margin-bottom:10px">
      ✅ <b>${_nuevoPackingRows.length} líneas</b> leídas · Contenedor(es): <b>${conts.join(', ')}</b> · Con diferencia: <b>${nDiff}</b>
    </div>
    <div class="table-wrap" style="max-height:200px;overflow-y:auto">
      <table><thead><tr><th>SKU</th><th>Descripción</th><th>Contenedor</th><th style="text-align:right">PL</th><th style="text-align:right">IN</th><th style="text-align:right">DIF</th><th>Estado</th></tr></thead>
      <tbody>${_nuevoPackingRows.slice(0,25).map(r=>`<tr>
        <td><code style="font-size:10px">${r.cod}</code></td>
        <td style="font-size:11px">${r.desc}</td><td>${r.contenedor}</td>
        <td style="text-align:right">${r.qty_pl.toLocaleString()}</td>
        <td style="text-align:right">${r.qty_in.toLocaleString()}</td>
        <td style="text-align:right;color:${r.dif<0?'#dc2626':r.dif>0?'#16a34a':'inherit'};font-weight:${r.dif!==0?700:400}">${r.dif>0?'+':''}${r.dif}</td>
        <td style="font-size:11px">${r.estado}</td>
      </tr>`).join('')}
      ${_nuevoPackingRows.length>25?`<tr><td colspan="7" style="text-align:center;font-size:11px;color:var(--text3)">…y ${_nuevoPackingRows.length-25} líneas más</td></tr>`:''}
      </tbody></table>
    </div>`;
  const btn = document.getElementById('btn-confirmar-packing');
  if (btn) btn.style.display='';
}

function confirmarNuevoPacking() {
  if (!_nuevoPackingRows.length) return;
  const existing = new Set((STATE.packingList||[]).map(r=>r.cod+'||'+r.contenedor));
  const nuevos = _nuevoPackingRows.filter(r=>!existing.has(r.cod+'||'+r.contenedor));
  STATE.packingList = [...(STATE.packingList||[]), ...nuevos];
  _nuevoPackingRows = [];
  closeModal();
  toast(`✅ ${nuevos.length} líneas importadas`);
  renderPackingList();
}

// fin
</script>
</script>


<script>
// ============================================================
// API CLIENT
// ============================================================
const API = {
  async call(method, path, body=null) {
    const opts = { method, headers: {'Content-Type':'application/json'} };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(path, opts);
    if (!res.ok) { const t = await res.text(); throw new Error(t); }
    return res.json();
  },
  get:  (path)       => API.call('GET', path),
  post: (path, body) => API.call('POST', path, body),
};

async function loadDataFromAPI() {
  try {
    const [stock, movs, packing] = await Promise.all([
      API.get('/api/stock'),
      API.get('/api/movimientos'),
      API.get('/api/packing'),
    ]);

    if (!stock || stock.length === 0) {
      toast('Primera vez: cargando datos iniciales...', 'info');
      seedData();
      const stockDB = STATE.stock.map(s => ({...s, descripcion: s.desc || ''}));
      const movsDB  = STATE.movimientos.map(m => ({...m, descripcion: m.desc || ''}));
      const r1 = await API.post('/api/stock/bulk', stockDB);
      const r2 = await API.post('/api/movimientos/bulk', movsDB);
      if (STATE.packingList && STATE.packingList.length > 0)
        await API.post('/api/packing', STATE.packingList);
      toast('✅ Datos iniciales cargados');
    } else {
      // Mapear descripcion → desc para compatibilidad con el HTML
      STATE.stock       = stock.map(s => ({...s, desc: s.descripcion || s.desc || '', retirado: s.retirado || 'NO'}));
      STATE.movimientos = movs.map(m => ({...m, desc: m.descripcion || m.desc || ''}));
      STATE.packingList = packing.map(p => ({...p, desc: p.descripcion || p.desc || ''}));
    }
  } catch(e) {
    console.error('Error cargando datos:', e);
    toast('⚠️ Usando datos locales', 'warn');
    seedData();
  }
}

// Override doLogin para usar API
window.doLoginAPI = async function(user, pass) {
  try {
    const res = await API.post('/api/login', {usuario: user, password: pass});
    return res;
  } catch(e) {
    return null;
  }
};

window.registrarDespachoAPI = async function(stockId, qty, guia, distribuidor) {
  const item = STATE.stock.find(s => s.id === stockId);
  if (!item) return {ok: false, msg: 'Item no encontrado'};
  const res = await API.post('/api/despacho', {
    stock_id: stockId, qty, guia,
    fecha: new Date().toISOString().slice(0,10),
    codigo: item.codigo, desc: item.desc,
    contenedor: item.contenedor, fv: item.fv,
    distribuidor: distribuidor || '',
  });
  if (res.ok) {
    item.qty -= qty;
    const movs = await API.get('/api/movimientos');
    STATE.movimientos = movs.map(m => ({...m, desc: m.descripcion || m.desc || ''}));
  }
  return res;
};

window.bajaMermaAPI = async function(lineas) {
  const informeId = 'INF-BAJA-' + Date.now();
  const fecha = new Date().toISOString().slice(0,10);
  const res = await API.post('/api/baja-merma', {lineas, fecha, informe_id: informeId});
  if (res.ok) {
    lineas.forEach(l => {
      const item = STATE.stock.find(s => s.id === l.stock_id);
      if (item) item.qty -= l.qty;
    });
  }
  return res;
};

window.ajusteAPI = async function(stockId, delta, motivo) {
  const fecha = new Date().toISOString().slice(0,10);
  const res = await API.post('/api/ajuste', {stock_id: stockId, delta, motivo, fecha});
  if (res.ok) {
    const item = STATE.stock.find(s => s.id === stockId);
    if (item) item.qty += delta;
  }
  return res;
};
</script>

<script>
// Login — se ejecuta después del script principal
(function() {
  var USERS = {
    'admin':        { pass: '123',       role: 'almacen', label: 'Administrador' },
    'ClienteMasef': { pass: 'CF_Masef',  role: 'cliente', label: 'Cliente MASEF'  }
  };

  window.doLogin = async function() {
    var user = document.getElementById('login-user').value.trim();
    var pass = document.getElementById('login-pass').value;
    var err  = document.getElementById('login-error');
    err.textContent = 'Verificando...';
    // Intentar login via API
    var apiRes = await window.doLoginAPI(user, pass);
    if (apiRes && apiRes.ok) {
      // Login via API exitoso
      err.textContent = '';
      STATE.currentUser = user;
      STATE.currentUserLabel = apiRes.label;
      document.getElementById('login-overlay').classList.add('hidden');
      document.getElementById('topbar-user-label').textContent = apiRes.label;
      var roleToggle = document.getElementById('sidebar-role-toggle');
      if (roleToggle) roleToggle.style.display = apiRes.rol === 'cliente' ? 'none' : '';
      await loadDataFromAPI();
      setRole(apiRes.rol);
    } else if (USERS[user] && USERS[user].pass === pass) {
      // Fallback local
      err.textContent = '';
      var u = USERS[user];
      STATE.currentUser = user;
      STATE.currentUserLabel = u.label;
      document.getElementById('login-overlay').classList.add('hidden');
      document.getElementById('topbar-user-label').textContent = u.label;
      var roleToggle = document.getElementById('sidebar-role-toggle');
      if (roleToggle) roleToggle.style.display = u.role === 'cliente' ? 'none' : '';
      await loadDataFromAPI();
      setRole(u.role);
    } else {
      err.textContent = 'Usuario o contraseña incorrectos';
      document.getElementById('login-pass').value = '';
    }
  };

  window.doLogout = function() {
    STATE.currentUser = null;
    STATE.currentUserLabel = null;
    document.getElementById('login-overlay').classList.remove('hidden');
    document.getElementById('login-user').value = '';
    document.getElementById('login-pass').value = '';
    document.getElementById('login-error').textContent = '';
  };
})();
</script>
